# fly.toml app configuration file generated for imitsu on 2026-03-05T18:27:54+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'imitsu'
primary_region = 'lhr'

[build]

[env]
  IMITSU_DB_PATH = '/data/imitsu.db'
  IMITSU_PORT = '3100'
  NODE_ENV = 'production'

[[mounts]]
  source = 'imitsu_data'
  destination = '/data'

[http_service]
  internal_port = 3100
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
