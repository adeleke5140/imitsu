version: 2

project_name: itui

before:
  hooks:
    - go mod tidy

git:
  tag_sort: -version:refname
  prerelease_suffix: "-"
  ignore_tags:
    - "(?i)^[^v]"

builds:
  - main: .
    binary: itui
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - format: binary
    name_template: "{{ .Binary }}-{{ .Os }}-{{ .Arch }}"

release:
  github:
    owner: adeleke5140
    name: imitsu

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
